<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snitch · Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --surface2:  #f0efe9;
  --border:    #e2e0d8;
  --border2:   #d0cec4;
  --accent:    #c8df20;
  --accent-d:  #afc410;
  --accent-text: #2a2a00;
  --text:      #1a1a1a;
  --text-2:    #666;
  --text-3:    #aaa;
  --danger:    #d93030;
  --success:   #1f9e5e;
  --warn:      #c97a00;
  --r:         10px;
  --mono:      'DM Mono', monospace;
  --display:   'Syne', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--display);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-logo{height:26px;width:auto}
.topbar-user{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-2);font-family:var(--mono)}
.logout-btn{background:none;border:1px solid var(--border2);color:var(--text-2);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .15s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* ── SCREENS ── */
.screen{display:none;flex:1}
.screen.active{display:flex}

/* ══ LOGIN ══ */
#login-screen{align-items:center;justify-content:center;background:var(--bg);padding:32px 20px;min-height:calc(100vh - 55px)}
.login-split{display:flex;width:100%;max-width:860px;border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.07);animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.login-brand{flex:1;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 40px;position:relative;overflow:hidden}
.login-brand::after{content:'';position:absolute;width:300px;height:300px;background:radial-gradient(ellipse, rgba(200,223,32,0.18) 0%, transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.brand-logo{width:130px;height:130px;object-fit:contain;position:relative;z-index:1;filter:invert(1)}
.brand-divider{width:40px;height:1px;background:rgba(255,255,255,0.15);margin:28px 0 20px;position:relative;z-index:1}
.brand-tagline{font-size:10px;font-family:var(--mono);letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);position:relative;z-index:1;text-align:center}
.brand-sub{margin-top:6px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.85);letter-spacing:0.02em;position:relative;z-index:1;text-align:center}
.brand-accent-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent);z-index:2}

.login-form-panel{width:360px;flex-shrink:0;background:var(--surface);padding:48px 40px;display:flex;flex-direction:column;justify-content:center}
.login-form-panel h2{font-size:24px;font-weight:800;letter-spacing:-0.02em;color:var(--text);margin-bottom:6px}
.login-hint{font-size:12px;font-family:var(--mono);color:var(--text-3);margin-bottom:36px;letter-spacing:0.02em}

.field{margin-bottom:20px}
.field label{display:block;font-size:10px;font-family:var(--mono);color:var(--text-2);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;font-weight:500}
.field select,.field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--display);font-weight:500;padding:12px 14px;outline:none;transition:border-color .15s,background .15s;appearance:none}
.field select:focus,.field input:focus{border-color:var(--accent-d);background:#fff}
.field select.loading{color:var(--text-3)}
.field select option{background:#fff;color:#1a1a1a}

.pin-wrapper{position:relative}
.pin-wrapper input{letter-spacing:0.25em;font-family:var(--mono);font-size:20px;padding-right:44px}
.pin-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px;line-height:1}

.login-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-weight:700;font-family:var(--display);letter-spacing:0.04em;cursor:pointer;transition:background .15s,transform .08s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{background:#333}
.login-btn:active{transform:scale(0.98)}
.login-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}
.login-btn .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.login-btn.loading .spin{display:block}
.login-btn.loading .btn-t{display:none}

.login-error{background:rgba(217,48,48,0.07);border:1px solid rgba(217,48,48,0.2);border-radius:8px;padding:10px 14px;font-size:12px;font-family:var(--mono);color:var(--danger);margin-top:14px;display:none;line-height:1.6}
.login-error a{color:var(--danger)}

@media(max-width:660px){
  #login-screen{padding:20px;align-items:flex-start;padding-top:32px}
  .login-split{flex-direction:column;max-width:420px;margin:0 auto;width:100%}
  .login-brand{padding:36px 24px}
  .brand-logo{width:90px;height:90px}
  .login-form-panel{width:100%;padding:32px 24px}
}

/* ══ APP SCREEN ══ */
#app-screen{flex-direction:column;background:var(--bg)}

.session-banner{display:flex;align-items:center;flex-wrap:wrap;gap:6px 14px;background:var(--surface);border-bottom:1px solid var(--border);padding:9px 24px;font-size:11px;font-family:var(--mono);color:var(--text-2)}
.session-banner strong{color:var(--text);font-weight:600}
.s-pill{background:var(--accent);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--accent-text);font-weight:600}

.app-content{padding:20px;max-width:700px;margin:0 auto;width:100%}

.date-strip{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px}
.date-label{font-size:10px;font-family:var(--mono);color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em}
.date-value{font-family:var(--mono);font-size:14px;color:var(--text);margin-top:3px;font-weight:500}
input[type="date"]{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 12px;outline:none}
input[type="date"]:focus{border-color:var(--accent-d)}

.load-btn{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);padding:13px;font-size:14px;font-family:var(--display);font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.load-btn:hover{border-color:#1a1a1a;background:#fff}
.load-btn:disabled{opacity:0.4;cursor:not-allowed}
.load-btn .spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:#1a1a1a;border-radius:50%;animation:spin .6s linear infinite;display:none}
.load-btn.loading .spinner{display:block}
.load-btn.loading .btn-text{display:none}

/* ── SEARCH ── */
.search-wrap{margin-bottom:10px}
.search-wrap input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--display);padding:11px 14px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent-d)}
.search-wrap input::placeholder{color:var(--text-3)}
.emp-row.hidden-by-search{display:none}

/* ── SUMMARY ── */
.summary-bar{display:none;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.summary-bar.visible{display:flex}
.sum-chip{font-size:11px;font-family:var(--mono);padding:4px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--text-2);background:var(--surface)}
.sum-chip.present{border-color:rgba(31,158,94,0.35);color:var(--success);background:rgba(31,158,94,0.06)}
.sum-chip.absent{border-color:rgba(217,48,48,0.3);color:var(--danger);background:rgba(217,48,48,0.05)}
.sum-chip.other{border-color:var(--border2)}

/* ── EMP LIST ── */
.emp-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.emp-count{font-size:11px;font-family:var(--mono);color:var(--text-2)}
.quick-actions{display:flex;gap:8px}
.quick-btn{font-size:11px;font-family:var(--mono);background:none;border:1px solid var(--border2);border-radius:5px;color:var(--text-2);padding:4px 10px;cursor:pointer;transition:all .15s}
.quick-btn:hover{border-color:#1a1a1a;color:var(--text)}

.emp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.emp-row{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;transition:border-color .15s}
.emp-row:hover{border-color:var(--border2)}
.emp-row-top{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.emp-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.emp-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-code{font-size:11px;font-family:var(--mono);color:var(--text-3)}

.status-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--mono);padding:6px 10px;outline:none;cursor:pointer;transition:border-color .15s;min-width:140px;appearance:none}
.status-select:focus{border-color:var(--accent-d)}
.status-select.present{border-color:rgba(31,158,94,0.5);color:var(--success);background:rgba(31,158,94,0.05)}
.status-select.absent{border-color:rgba(217,48,48,0.4);color:var(--danger);background:rgba(217,48,48,0.04)}
.status-select.week-off{border-color:var(--border2);color:var(--text-2)}
.status-select.sick-leave{border-color:rgba(201,122,0,0.4);color:var(--warn);background:rgba(201,122,0,0.05)}
.status-select.planned-leave{border-color:rgba(30,100,220,0.4);color:#1e64dc;background:rgba(30,100,220,0.04)}
.status-select.unplanned-leave{border-color:rgba(150,50,200,0.4);color:#9632c8;background:rgba(150,50,200,0.04)}

.remarks-field{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text-2);font-size:12px;font-family:var(--display);padding:8px 10px;outline:none;width:100%;resize:none;transition:border-color .15s;margin-top:8px;display:none}
.remarks-field:focus{border-color:var(--accent-d);color:var(--text)}
.remarks-field.visible{display:block}

/* ── SUBMIT ── */
.submit-section{margin-top:4px}
.marked-by-field{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text-2);font-size:13px;font-family:var(--mono);padding:11px 14px;width:100%;margin-bottom:12px}
.submit-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:15px;font-weight:700;font-family:var(--display);letter-spacing:0.02em;cursor:pointer;transition:background .15s,transform .08s;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:#333}
.submit-btn:active{transform:scale(0.99)}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.submit-btn .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-text{display:none}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;border-radius:10px;padding:12px 20px;font-size:12px;font-family:var(--mono);color:#fff;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;border:1px solid #333}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#1f9e5e;border-color:#1f9e5e;color:#fff}
.toast.error{background:var(--danger);border-color:var(--danger);color:#fff}
.toast.info{background:#1a1a1a;color:var(--accent)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;font-family:var(--mono);display:none}
.empty-state.visible{display:block}

@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
@media(max-width:480px){
  .emp-row-top{grid-template-columns:1fr}
  .status-select{min-width:100%}
}
</style>
</head>

<!-- APP SCREEN -->
<div class="screen" id="app-screen">

  <div class="session-banner">
    <span>Logged in as</span>
    <strong id="sb-name"></strong>
    <span class="s-pill" id="sb-facility"></span>
    <span class="s-pill" id="sb-department"></span>
  </div>

  <div class="app-content">

    <div class="date-strip">
      <div>
        <div class="date-label">Attendance Date</div>
        <div class="date-value" id="date-display"></div>
      </div>
      <input type="date" id="att-date" />
    </div>

    <button class="load-btn" id="load-btn" onclick="loadEmployees()">
      <div class="spinner"></div>
      <span class="btn-text">↓ Load Employees</span>
    </button>

    <div class="summary-bar" id="summary-bar"></div>

    <!-- SEARCH — hidden until employees loaded -->
    <div class="search-wrap hidden" id="search-wrap">
      <input type="text" id="emp-search" placeholder="Search by name or employee code…" oninput="filterEmployees(this.value)" />
    </div>

    <div class="emp-list-header hidden" id="emp-list-header">
      <div class="emp-count" id="emp-count"></div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="markAll('Present')">All Present</button>
        <button class="quick-btn" onclick="markAll('Week Off')">All Week Off</button>
      </div>
    </div>

    <div class="emp-list" id="emp-list"></div>
    <div class="empty-state" id="empty-state">No employees found for this facility / department.</div>

    <div class="submit-section hidden" id="submit-section">
      <input class="marked-by-field" id="marked-by" readonly />
      <button class="submit-btn" id="submit-btn" onclick="submitAttendance()">
        <div class="spinner"></div>
        <span class="btn-text">Submit Attendance</span>
      </button>
    </div>

  </div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CFG = {
  AUTH_LIST_URL:     'https://n8n.snitch-workflow.com/webhook/auth-login',
  AUTH_LOGIN_URL:    'https://n8n.snitch-workflow.com/webhook/auth-login',
  GET_EMPLOYEES_URL: 'https://n8n.snitch-workflow.com/webhook/get-employees',
  SUBMIT_URL:        'https://n8n.snitch-workflow.com/webhook/attendance-submit',
};

/* ══ STATE ══════════════════════════════════════════════ */
let session   = null;
let employees = [];

/* ══ INIT ════════════════════════════════════════════════ */
(function init() {
  const today = toISTDateString(new Date());
  document.getElementById('att-date').value = today;
  updateDateDisplay(today);
  document.getElementById('att-date').addEventListener('change', e => updateDateDisplay(e.target.value));
  const saved = sessionStorage.getItem('snitch_session');
  if (saved) {
    try { session = JSON.parse(saved); enterApp(); return; } catch(e) {}
  }
  loadSupervisorList();
})();

/* ══ DATE HELPERS ════════════════════════════════════════ */
function toISTDateString(d) {
  return new Date(d.getTime() + 5.5 * 3600000).toISOString().slice(0, 10);
}
function toISTTimestamp() {
  return new Date(Date.now() + 5.5 * 3600000).toISOString().slice(0, 19);
}
function updateDateDisplay(val) {
  if (!val) return;
  const [y, m, d] = val.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent = `${d} ${months[+m-1]} ${y}`;
}

/* ══ SUPERVISOR LIST ═════════════════════════════════════ */
async function loadSupervisorList() {
  const sel = document.getElementById('login-name');
  try {
    const res  = await fetch(CFG.AUTH_LIST_URL + '?list=true');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    sel.innerHTML = '<option value="">Select your name…</option>';
    sel.classList.remove('loading');
    if (data.supervisors && data.supervisors.length > 0) {
      data.supervisors.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
    } else {
      sel.innerHTML = '<option value="">No supervisors found</option>';
    }
  } catch(e) {
    sel.innerHTML = '<option value="">Could not load — retry</option>';
    sel.classList.remove('loading');
    setTimeout(() => {
      const errEl = document.getElementById('login-error');
      errEl.innerHTML = 'Could not load supervisor list. <a href="#" onclick="loadSupervisorList();this.parentElement.style.display=\'none\';return false">Retry</a>';
      errEl.style.display = 'block';
    }, 300);
  }
}

/* ══ LOGIN ═══════════════════════════════════════════════ */
function togglePin() {
  const inp = document.getElementById('login-pin');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const name  = document.getElementById('login-name').value.trim();
  const pin   = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!name) { showLoginError('Please select your name.'); return; }
  if (!pin)  { showLoginError('Please enter your PIN.'); return; }
  btn.classList.add('loading'); btn.disabled = true;
  try {
    const res  = await fetch(CFG.AUTH_LOGIN_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ supervisor_name: name, pin }),
    });
    const data = await res.json();
    if (!data.success) { showLoginError(data.message || 'Invalid credentials. Please try again.'); return; }
    session = { supervisor_name: data.supervisor_name, facility: data.facility, department: data.department };
    sessionStorage.setItem('snitch_session', JSON.stringify(session));
    enterApp();
  } catch(e) {
    showLoginError('Could not reach server. Check your connection.');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.innerHTML = msg; el.style.display = 'block';
}

function enterApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('topbar-user').style.display = 'flex';
  document.getElementById('topbar-name').textContent = session.supervisor_name;
  document.getElementById('sb-name').textContent = session.supervisor_name;
  document.getElementById('sb-facility').textContent = session.facility;
  document.getElementById('sb-department').textContent = session.department;
  document.getElementById('marked-by').value = session.supervisor_name;
}

function logout() {
  sessionStorage.removeItem('snitch_session');
  session = null; employees = [];
  document.getElementById('emp-list').innerHTML = '';
  document.getElementById('emp-list-header').classList.add('hidden');
  document.getElementById('submit-section').classList.add('hidden');
  document.getElementById('search-wrap').classList.add('hidden');
  document.getElementById('emp-search').value = '';
  document.getElementById('summary-bar').classList.remove('visible');
  document.getElementById('empty-state').classList.remove('visible');
  document.getElementById('topbar-user').style.display = 'none';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  const sb = document.getElementById('submit-btn');
  sb.innerHTML = '<div class="spinner"></div><span class="btn-text">Submit Attendance</span>';
  sb.style.background = ''; sb.style.color = ''; sb.disabled = false;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('login-name').innerHTML = '<option value="">Loading…</option>';
  document.getElementById('login-name').classList.add('loading');
  loadSupervisorList();
}

/* ══ LOAD EMPLOYEES ══════════════════════════════════════ */
async function loadEmployees() {
  const btn = document.getElementById('load-btn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    const url  = `${CFG.GET_EMPLOYEES_URL}?facility=${encodeURIComponent(session.facility)}&department=${encodeURIComponent(session.department)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    employees  = data.employees || [];
    renderEmployeeList();
  } catch(e) {
    showToast('Failed to load employees. Try again.', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

/* ══ RENDER EMPLOYEE LIST ════════════════════════════════ */
function renderEmployeeList() {
  const list   = document.getElementById('emp-list');
  const header = document.getElementById('emp-list-header');
  const submit = document.getElementById('submit-section');
  const empty  = document.getElementById('empty-state');
  const search = document.getElementById('search-wrap');
  list.innerHTML = '';
  document.getElementById('emp-search').value = '';

  if (employees.length === 0) {
    empty.classList.add('visible');
    header.classList.add('hidden');
    submit.classList.add('hidden');
    search.classList.add('hidden');
    return;
  }

  empty.classList.remove('visible');
  header.classList.remove('hidden');
  submit.classList.remove('hidden');
  search.classList.remove('hidden');
  document.getElementById('emp-count').textContent = `${employees.length} employee${employees.length !== 1 ? 's' : ''}`;

  const statuses = ['Present','Absent','Week Off','Sick Leave','Planned Leave','Unplanned Leave'];
  employees.forEach((emp, idx) => {
    const row  = document.createElement('div');
    row.className = 'emp-row';
    const opts = statuses.map(s => `<option value="${s}"${s==='Present'?' selected':''}>${s}</option>`).join('');
    row.innerHTML = `
      <div class="emp-row-top">
        <div class="emp-info">
          <div class="emp-name">${escHtml(emp.employee_name)}</div>
          <div class="emp-code">${escHtml(emp.employee_code)}${emp.facility ? ' &middot; ' + escHtml(emp.facility) : ''}</div>
        </div>
        <select class="status-select present" onchange="onStatusChange(this,${idx})" data-idx="${idx}">${opts}</select>
      </div>
      <textarea class="remarks-field" placeholder="Remarks (optional)…" rows="1" data-idx="${idx}"></textarea>`;
    list.appendChild(row);
  });
  updateSummary();
}

/* ══ SEARCH ══════════════════════════════════════════════ */
function filterEmployees(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.emp-row').forEach((row, idx) => {
    const emp   = employees[idx];
    const match = !q ||
      emp.employee_name.toLowerCase().includes(q) ||
      emp.employee_code.toLowerCase().includes(q);
    row.classList.toggle('hidden-by-search', !match);
  });
}

/* ══ STATUS CHANGE ═══════════════════════════════════════ */
function onStatusChange(sel, idx) {
  const cls = {
    'Present':'present','Absent':'absent','Week Off':'week-off',
    'Sick Leave':'sick-leave','Planned Leave':'planned-leave','Unplanned Leave':'unplanned-leave'
  }[sel.value] || '';
  sel.className = `status-select ${cls}`;
  const rf = document.querySelector(`.remarks-field[data-idx="${idx}"]`);
  if (rf) {
    if (sel.value !== 'Present' && sel.value !== 'Week Off') rf.classList.add('visible');
    else { rf.classList.remove('visible'); rf.value = ''; }
  }
  updateSummary();
}

function markAll(status) {
  document.querySelectorAll('.status-select').forEach(sel => {
    sel.value = status; onStatusChange(sel, +sel.dataset.idx);
  });
}

function updateSummary() {
  const bar = document.getElementById('summary-bar');
  if (employees.length === 0) { bar.classList.remove('visible'); return; }
  const counts = {};
  document.querySelectorAll('.status-select').forEach(sel => {
    counts[sel.value] = (counts[sel.value]||0)+1;
  });
  const lbl = {'Present':'present','Absent':'absent'};
  bar.innerHTML = Object.entries(counts).map(([s,c]) =>
    `<div class="sum-chip ${lbl[s]||'other'}">${s}: ${c}</div>`).join('');
  bar.classList.add('visible');
}

/* ══ SUBMIT ══════════════════════════════════════════════ */
async function submitAttendance() {
  const btn = document.getElementById('submit-btn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    const empPayload = employees.map((emp, idx) => ({
      employee_id:       emp.id,
      employee_code:     emp.employee_code,
      employee_name:     emp.employee_name,
      attendance_status: document.querySelector(`.status-select[data-idx="${idx}"]`)?.value || 'Present',
      remarks:           document.querySelector(`.remarks-field[data-idx="${idx}"]`)?.value.trim() || '',
    }));
    const payload = {
      attendance_date: document.getElementById('att-date').value,
      facility:        session.facility,
      department:      session.department,
      marked_by:       session.supervisor_name,
      marked_at:       toISTTimestamp(),
      employees:       empPayload,
    };
    const res  = await fetch(CFG.SUBMIT_URL, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Submit failed');
    showToast(`✓ Submitted for ${empPayload.length} employees`, 'success');
    btn.classList.remove('loading');
    btn.innerHTML = '✓ Submitted';
    btn.style.background = '#1f9e5e';
    btn.disabled = true;
  } catch(e) {
    showToast(e.message || 'Submission failed. Try again.', 'error');
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

/* ══ TOAST ═══════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('login-pin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
