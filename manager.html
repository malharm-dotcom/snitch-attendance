<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snitch · Manager Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --surface2:  #f0efe9;
  --border:    #e2e0d8;
  --border2:   #d0cec4;
  --accent:    #c8df20;
  --accent-d:  #afc410;
  --accent-text: #2a2a00;
  --text:      #1a1a1a;
  --text-2:    #666;
  --text-3:    #aaa;
  --danger:    #d93030;
  --success:   #1f9e5e;
  --warn:      #c97a00;
  --r:         10px;
  --mono:      'DM Mono', monospace;
  --display:   'Syne', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--display);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#1a1a1a;border-bottom:1px solid #2e2e2e;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{height:24px;width:auto;filter:invert(1)}
.topbar-badge{background:var(--accent);color:var(--accent-text);font-size:10px;font-family:var(--mono);font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase}
.topbar-user{display:flex;align-items:center;gap:12px;font-size:12px;color:rgba(255,255,255,0.5);font-family:var(--mono)}
.topbar-user strong{color:rgba(255,255,255,0.9)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .15s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* ── SCREENS ── */
.screen{display:none;flex:1}
.screen.active{display:flex}

/* ══ LOGIN ══ */
#login-screen{align-items:center;justify-content:center;background:var(--bg);padding:32px 20px;min-height:100vh}
.login-wrap{width:100%;max-width:420px;border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.08);animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.login-head{background:#1a1a1a;padding:36px 36px 32px;position:relative;overflow:hidden}
.login-head::after{content:'';position:absolute;width:240px;height:240px;background:radial-gradient(ellipse,rgba(200,223,32,0.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-head-logo{height:28px;filter:invert(1);position:relative;z-index:1}
.login-head-title{font-size:18px;font-weight:800;color:#fff;margin-top:16px;position:relative;z-index:1}
.login-head-sub{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,0.35);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;position:relative;z-index:1}
.login-head-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent)}
.login-body{background:var(--surface);padding:32px 36px}

.field{margin-bottom:18px}
.field label{display:block;font-size:10px;font-family:var(--mono);color:var(--text-2);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;font-weight:500}
.field select,.field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--display);font-weight:500;padding:12px 14px;outline:none;transition:border-color .15s;appearance:none}
.field select:focus,.field input:focus{border-color:var(--accent-d);background:#fff}
.field select.loading{color:var(--text-3)}

.pin-wrapper{position:relative}
.pin-wrapper input{letter-spacing:0.25em;font-family:var(--mono);font-size:20px;padding-right:44px}
.pin-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px;line-height:1}

.login-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-weight:700;font-family:var(--display);letter-spacing:0.04em;cursor:pointer;transition:background .15s,transform .08s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.login-btn:hover{background:#333}
.login-btn:active{transform:scale(0.98)}
.login-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}
.login-btn .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.login-btn.loading .spin{display:block}
.login-btn.loading .btn-t{display:none}

.login-error{background:rgba(217,48,48,0.07);border:1px solid rgba(217,48,48,0.2);border-radius:8px;padding:10px 14px;font-size:12px;font-family:var(--mono);color:var(--danger);margin-top:14px;display:none;line-height:1.6}

/* ══ APP SCREEN ══ */
#app-screen{flex-direction:column}

.app-content{padding:24px;max-width:800px;margin:0 auto;width:100%}

.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.page-sub{font-size:12px;font-family:var(--mono);color:var(--text-2);margin-top:4px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:10px;font-size:12px;font-family:var(--mono);font-weight:600;border:none;border-radius:7px;cursor:pointer;background:none;color:var(--text-2);transition:all .15s;letter-spacing:0.02em;position:relative}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab-badge{background:var(--danger);color:#fff;font-size:9px;border-radius:20px;padding:1px 6px;margin-left:6px;vertical-align:middle;font-weight:700}
.tab-badge.empty{background:var(--border2);color:var(--text-3)}

/* Refresh */
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.refresh-meta{font-size:11px;font-family:var(--mono);color:var(--text-3)}
.refresh-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--text-2);font-size:11px;font-family:var(--mono);padding:5px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:#1a1a1a;color:var(--text)}
.refresh-btn .spin-sm{width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:#666;border-radius:50%;animation:spin .6s linear infinite;display:none}
.refresh-btn.loading .spin-sm{display:inline-block}
.refresh-btn.loading .ref-txt{display:none}

/* Request cards */
.requests-list{display:flex;flex-direction:column;gap:10px}
.req-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color .15s;animation:fadeUp .2s ease both}
.req-card:hover{border-color:var(--border2)}
.req-card.pending{border-left:3px solid var(--warn)}
.req-card.approved{border-left:3px solid var(--success)}
.req-card.rejected{border-left:3px solid var(--text-3)}
.req-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.req-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.req-tag{font-size:10px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--text-2)}
.req-tag.dept{background:rgba(200,223,32,0.15);border-color:rgba(200,223,32,0.4);color:#3a4d00}
.req-tag.date{background:rgba(30,100,220,0.07);border-color:rgba(30,100,220,0.2);color:#1e64dc}
.req-supervisor{font-size:14px;font-weight:700;margin-bottom:4px}
.req-time{font-size:11px;font-family:var(--mono);color:var(--text-3);margin-bottom:10px}
.req-reason-label{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);margin-bottom:4px}
.req-reason{font-size:13px;color:var(--text-2);line-height:1.55;background:var(--surface2);border-radius:7px;padding:10px 12px;border:1px solid var(--border)}
.req-status{display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.pending{background:var(--warn)}
.status-dot.approved{background:var(--success)}
.status-dot.rejected{background:var(--text-3)}
.status-text{font-size:11px;font-family:var(--mono);font-weight:600}
.status-text.pending{color:var(--warn)}
.status-text.approved{color:var(--success)}
.status-text.rejected{color:var(--text-3)}

.req-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.action-btn{padding:8px 16px;border-radius:7px;font-size:12px;font-family:var(--display);font-weight:700;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:6px}
.action-btn:disabled{opacity:0.4;cursor:not-allowed}
.action-btn.approve{background:var(--success);color:#fff}
.action-btn.approve:hover:not(:disabled){background:#178a50}
.action-btn.reject{background:none;border:1.5px solid var(--border2);color:var(--text-2)}
.action-btn.reject:hover:not(:disabled){border-color:var(--danger);color:var(--danger)}
.action-btn .spin{width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.action-btn.loading .spin{display:inline-block}
.action-btn.reject .spin{border-color:rgba(0,0,0,0.15);border-top-color:var(--danger)}

/* Empty & loading states */
.empty-state{text-align:center;padding:52px 20px;color:var(--text-3);font-size:13px;font-family:var(--mono);line-height:1.7}
.empty-icon{font-size:32px;margin-bottom:12px}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--r);height:110px;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;border-radius:10px;padding:12px 20px;font-size:12px;font-family:var(--mono);color:#fff;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;border:1px solid #333}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success);border-color:var(--success)}
.toast.error{background:var(--danger);border-color:var(--danger)}

/* Confirm modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;padding:28px;max-width:380px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,0.15);transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:12px;font-family:var(--mono);color:var(--text-2);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px}
.modal-cancel{flex:1;background:none;border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text-2);padding:10px;font-size:13px;font-family:var(--display);font-weight:600;cursor:pointer}
.modal-confirm-btn{flex:2;border:none;border-radius:var(--r);padding:10px;font-size:13px;font-family:var(--display);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.modal-confirm-btn.approve{background:var(--success);color:#fff}
.modal-confirm-btn.reject-confirm{background:var(--danger);color:#fff}

@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
@media(max-width:580px){
  .req-top{flex-direction:column}
  .req-actions{width:100%}
  .action-btn{flex:1;justify-content:center}
  .tabs{flex-direction:column;gap:2px}
}
</style>
</head>

<!-- LOGIN SCREEN -->
<div class="screen active" id="login-screen">
  <div class="login-wrap">
    <div class="login-head">
      <img class="login-head-logo" src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/wAARCAQABAADASIAAhEBAxEB/8QAGQABAQEBAQEAAAAAAAAAAAAAAAQDAgEI/8QAKhABAAIAAwgDAQADAQEAAAAAAAECAxESBBMyM1FSYXEhMZFBQoGhIiP/xAAWAQEBAQAAAAAAAAAAAAAAAAAAAQL/xAAWEQEBAQAAAAAAAAAAAAAAAAAAARH/2gAMAwEAAhEDEQA/APjIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAexEzOURm90X7ZByOtF+2TRftkHI60X7ZNF+2Qcj2YynKXgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAANdn5n+lCfZ+Z/pQJQAQABJi8y3ty6xeZb25GgAAAAAAAAAAHtazacogHjuuHa31DbDwor82+ZaCaxrgR/ZdxhUj/ABdgOdFO2Pw0U7Y/HQI4nCpP+Li2BH+MtgVJelq/cOVrLEwYn5r8eA1OPZiYnKXgoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADXZ+Z/pQjiZj6NVus/omLB5Tgj09EBxjfGHOSbVbrP6K9xeZb25AUAAAAAAAAB7WJmYiAe4dJvbKFNKxWMoKVitcodCAPLWrWM5kR6J740zwxkzm0z9zIuK5tWP7BFqz/YRgYtEcWmPqZa0xpj4t8hjceVmLRnE5vRHGLhxePKaYynKVjHaKZxqj7/osYACgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAALKcEenrynBHp6MuMflylVY/LlKLAAUAAAAAAAAb7PXKNU/wBY1jVaIWRGURECUB5e0VrMyI5xbxSPKa0zac5ktabWzl4NAAAAAAOsO80nP+KqzFoiYRtdnvlbTP1IlUE/MAIkxK6bzDlvtNfq3+mA0AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/2Q==" alt="Snitch" />
      <div class="login-head-title">Manager Portal</div>
      <div class="login-head-sub">Attendance Edit Approvals</div>
      <div class="login-head-bar"></div>
    </div>
    <div class="login-body">
      <div class="field">
        <label>Your Name</label>
        <select id="login-name" class="loading">
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="field">
        <label>PIN</label>
        <div class="pin-wrapper">
          <input type="password" id="login-pin" maxlength="6" placeholder="······" inputmode="numeric" autocomplete="off" />
          <button class="pin-toggle" onclick="togglePin()" type="button">👁</button>
        </div>
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">
        <div class="spin"></div>
        <span class="btn-t">Sign In →</span>
      </button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div class="screen" id="app-screen">
  <div class="app-content">
    <div class="page-header">
      <div class="page-title">Edit Requests</div>
      <div class="page-sub" id="page-sub-text">Attendance rewrite requests from supervisors</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
        Pending <span class="tab-badge" id="badge-pending">0</span>
      </button>
      <button class="tab-btn" id="tab-resolved" onclick="switchTab('resolved')">
        Resolved <span class="tab-badge empty" id="badge-resolved">0</span>
      </button>
    </div>

    <div class="refresh-row">
      <div class="refresh-meta" id="refresh-meta">—</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadRequests()">
        <div class="spin-sm"></div>
        <span class="ref-txt">↻ Refresh</span>
      </button>
    </div>

    <div id="requests-container"></div>
  </div>
</div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CFG = {
  AUTH_LIST_URL:       'https://n8n.snitch-workflow.com/webhook/auth-login',
  AUTH_LOGIN_URL:      'https://n8n.snitch-workflow.com/webhook/auth-login',
  GET_REQUESTS_URL:    'https://n8n.snitch-workflow.com/webhook/get-rewrite-requests',
  HANDLE_APPROVAL_URL: 'https://n8n.snitch-workflow.com/webhook/handle-approval',
};

/* ══ STATE ════════════════════════════════════════════════ */
let session     = null;
let allRequests = [];
let activeTab   = 'pending';
let pendingAction = null; // { requestId, action }

/* ══ INIT ═════════════════════════════════════════════════ */
(function init() {
  const saved = sessionStorage.getItem('snitch_manager_session');
  if (saved) {
    try { session = JSON.parse(saved); enterApp(); return; } catch(e) {}
  }
  loadManagerList();
})();

/* ══ LOAD MANAGER LIST ════════════════════════════════════ */
async function loadManagerList() {
  const sel = document.getElementById('login-name');
  try {
    const res  = await fetch(CFG.AUTH_LIST_URL + '?list=true&role=manager');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = data.managers || data.supervisors || [];
    sel.innerHTML = '<option value="">Select your name…</option>';
    sel.classList.remove('loading');
    list.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });
    if (list.length === 0) sel.innerHTML = '<option value="">No managers found</option>';
  } catch(e) {
    sel.innerHTML = '<option value="">Could not load — retry</option>';
    sel.classList.remove('loading');
  }
}

/* ══ LOGIN ════════════════════════════════════════════════ */
function togglePin() {
  const inp = document.getElementById('login-pin');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const name  = document.getElementById('login-name').value.trim();
  const pin   = document.getElementById('login-pin').value.trim();
  const btn   = document.getElementById('login-btn');
  document.getElementById('login-error').style.display = 'none';
  if (!name) { showLoginError('Please select your name.'); return; }
  if (!pin)  { showLoginError('Please enter your PIN.'); return; }
  btn.classList.add('loading'); btn.disabled = true;
  try {
    const res  = await fetch(CFG.AUTH_LOGIN_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ supervisor_name: name, pin }),
    });
    const data = await res.json();
    if (!data.success) { showLoginError(data.message || 'Invalid credentials.'); return; }
    if ((data.role || '').toLowerCase() !== 'manager') {
      showLoginError('Access denied. This portal is for managers only.');
      return;
    }
    session = { supervisor_name: data.supervisor_name, facility: data.facility, department: data.department, role: data.role };
    sessionStorage.setItem('snitch_manager_session', JSON.stringify(session));
    enterApp();
  } catch(e) {
    showLoginError('Could not reach server. Check your connection.');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.innerHTML = msg; el.style.display = 'block';
}

function enterApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('topbar-user').style.display = 'flex';
  document.getElementById('topbar-name').textContent = session.supervisor_name;
  document.getElementById('page-sub-text').textContent =
    `Logged in as ${session.supervisor_name} · ${session.facility}`;
  loadRequests();
  // Auto-refresh every 60 seconds
  setInterval(loadRequests, 60000);
}

function logout() {
  sessionStorage.removeItem('snitch_manager_session');
  session = null; allRequests = [];
  document.getElementById('topbar-user').style.display = 'none';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('login-name').innerHTML = '<option value="">Loading…</option>';
  document.getElementById('login-name').classList.add('loading');
  loadManagerList();
}

/* ══ LOAD REQUESTS ════════════════════════════════════════ */
async function loadRequests() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading'); btn.disabled = true;
  showSkeleton();
  try {
    const res  = await fetch(CFG.GET_REQUESTS_URL);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    allRequests = data.requests || [];
    const now = new Date();
    document.getElementById('refresh-meta').textContent =
      `Last updated ${now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}`;
    renderRequests();
  } catch(e) {
    document.getElementById('requests-container').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div>Could not load requests.<br>Check your connection and try again.</div>`;
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

/* ══ RENDER REQUESTS ══════════════════════════════════════ */
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
  document.getElementById('tab-resolved').classList.toggle('active', tab === 'resolved');
  renderRequests();
}

function renderRequests() {
  const pending  = allRequests.filter(r => r.request_status === 'pending');
  const resolved = allRequests.filter(r => r.request_status !== 'pending');
  const badge_p  = document.getElementById('badge-pending');
  const badge_r  = document.getElementById('badge-resolved');
  badge_p.textContent = pending.length;
  badge_p.className   = 'tab-badge' + (pending.length === 0 ? ' empty' : '');
  badge_r.textContent = resolved.length;
  badge_r.className   = 'tab-badge empty';

  const list    = activeTab === 'pending' ? pending : resolved;
  const container = document.getElementById('requests-container');

  if (list.length === 0) {
    const msg = activeTab === 'pending'
      ? `<div class="empty-icon">✅</div>No pending requests<br>All caught up!`
      : `<div class="empty-icon">📋</div>No resolved requests yet`;
    container.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  container.innerHTML = '';
  const frag = document.createDocumentFragment();
  list.forEach((req, i) => {
    const card = document.createElement('div');
    card.className = `req-card ${req.request_status}`;
    card.style.animationDelay = `${i * 40}ms`;
    const statusDot   = req.request_status;
    const statusLabel = { pending: 'Pending', approved: 'Approved', rejected: 'Rejected' }[req.request_status] || req.request_status;
    const actionsHtml = req.request_status === 'pending' ? `
      <div class="req-actions">
        <button class="action-btn approve" onclick="confirmAction(${req.request_id},'approve')">✓ Approve</button>
        <button class="action-btn reject" onclick="confirmAction(${req.request_id},'reject')">✕ Reject</button>
      </div>` : `<div style="margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--text-3)">Actioned by ${escHtml(req.actioned_by||'—')} · ${fmtTimestamp(req.actioned_at)}</div>`;
    card.innerHTML = `
      <div class="req-top">
        <div>
          <div class="req-meta">
            <span class="req-tag dept">${escHtml(req.department)} / ${escHtml(req.facility)}</span>
            <span class="req-tag date">${fmtDate(req.attendance_date)}</span>
          </div>
          <div class="req-supervisor">${escHtml(req.supervisor_name)}</div>
          <div class="req-time">Requested ${fmtTimestamp(req.requested_at)}</div>
          <div class="req-reason-label">Reason</div>
          <div class="req-reason">${escHtml(req.reason)}</div>
        </div>
        <div class="req-status">
          <div class="status-dot ${statusDot}"></div>
          <div class="status-text ${statusDot}">${statusLabel}</div>
        </div>
      </div>
      ${actionsHtml}`;
    frag.appendChild(card);
  });
  container.appendChild(frag);
}

function showSkeleton() {
  document.getElementById('requests-container').innerHTML =
    '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton" style="height:80px"></div>';
}

/* ══ APPROVAL ACTIONS ════════════════════════════════════ */
function confirmAction(requestId, action) {
  pendingAction = { requestId, action };
  const isApprove = action === 'approve';
  document.getElementById('confirm-title').textContent = isApprove ? 'Approve Edit Request' : 'Reject Edit Request';
  document.getElementById('confirm-sub').textContent = isApprove
    ? 'The supervisor will be unlocked to resubmit attendance for this date and department.'
    : 'The supervisor will not be able to edit. They will need to submit a new request if needed.';
  const btn = document.getElementById('confirm-action-btn');
  btn.textContent = isApprove ? 'Approve' : 'Reject';
  btn.className   = `modal-confirm-btn ${isApprove ? 'approve' : 'reject-confirm'}`;
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('open');
  pendingAction = null;
}

async function executeAction() {
  if (!pendingAction) return;
  const { requestId, action } = pendingAction;
  closeConfirmModal();
  // Optimistic UI update
  const card = [...document.querySelectorAll('.req-card')].find(c =>
    c.querySelector(`.action-btn`)?.getAttribute('onclick')?.includes(requestId)
  );
  if (card) {
    card.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
  }
  try {
    const res = await fetch(CFG.HANDLE_APPROVAL_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        request_id:  requestId,
        action:      action,       // 'approve' | 'reject'
        actioned_by: session.supervisor_name,
        actioned_at: toISTTimestamp(),
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Action failed');
    showToast(`Request ${action === 'approve' ? 'approved' : 'rejected'} successfully`, 'success');
    await loadRequests();
  } catch(e) {
    showToast(e.message || 'Action failed. Try again.', 'error');
    await loadRequests(); // Reload to restore correct state
  }
}

/* ══ HELPERS ══════════════════════════════════════════════ */
function toISTTimestamp() {
  return new Date(Date.now() + 5.5 * 3600000).toISOString().slice(0, 19);
}
function fmtTimestamp(ts) {
  if (!ts) return '—';
  try {
    const [datePart, timePart] = ts.split('T');
    const [y, m, d] = datePart.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [hh, mm] = timePart.split(':');
    const h = parseInt(hh), ampm = h >= 12 ? 'PM' : 'AM';
    return `${d} ${months[+m-1]} ${y}, ${h%12||12}:${mm} ${ampm}`;
  } catch(e) { return ts; }
}
function fmtDate(ds) {
  if (!ds) return '—';
  try {
    const [y, m, d] = ds.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${d} ${months[+m-1]} ${y}`;
  } catch(e) { return ds; }
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

document.getElementById('login-pin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('confirm-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-modal')) closeConfirmModal();
});
</script>
